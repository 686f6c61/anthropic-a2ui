name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Run tests
        run: uv run --python 3.12 --with pytest --with pytest-asyncio python -m pytest tests/ -q
      - name: Check format
        run: uv run --python 3.12 --with pyink python -m pyink --check src/ tests/
      - name: Build package
        run: uv build
      - name: Check package metadata
        run: uvx twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
